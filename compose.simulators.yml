x-simulator-base: &simulator-base
  build:
    context: .
    dockerfile: Dockerfile.simulator
  image: telemetry-simulator:latest
  restart: unless-stopped
  mem_limit: 128m
  cpus: 0.25
  environment:
    GATEWAY_URL: ${GATEWAY_URL:?GATEWAY_URL must be set}
    INTERVAL_SECONDS: ${INTERVAL_SECONDS:-60}
    REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-10}
    RUST_LOG: ${SIMULATOR_RUST_LOG:-telemetry_simulator=info}

services:
  sim-logistica-01:
    <<: *simulator-base
    environment:
      GATEWAY_URL: ${GATEWAY_URL:?GATEWAY_URL must be set}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-60}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-10}
      RUST_LOG: ${SIMULATOR_RUST_LOG:-telemetry_simulator=info}
      DEVICE_ID: nodo-logistica-01
      PRESET: logistica

  sim-logistica-02:
    <<: *simulator-base
    environment:
